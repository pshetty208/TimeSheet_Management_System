<div class="login-container">
  <div class="login-box">
    <h2>TimeSheet Management System</h2>
    <form [formGroup]="loginForm" (ngSubmit)="login()">
      <div class="form-group">
        <label>Username</label>
        <input type="text" formControlName="username" class="form-control"
          [ngClass]="{ 'is-invalid': f.username.invalid && (f.username.dirty || f.username.touched) }">
        <div class="error-text" *ngIf="f.username.invalid && (f.username.dirty || f.username.touched)">
          <span *ngIf="f.username.hasError('required')">Username is required</span>
          <span *ngIf="f.username.hasError('minlength')">Username must be at least 3 characters</span>
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" formControlName="password" class="form-control"
          [ngClass]="{ 'is-invalid': f.password.invalid && (f.password.dirty || f.password.touched) }">
        <div class="error-text" *ngIf="f.password.invalid && (f.password.dirty || f.password.touched)">
          <span *ngIf="f.password.hasError('required')">Password is required</span>
          <span *ngIf="f.password.hasError('minlength')">Password must be at least 6 characters</span>
        </div>
      </div>

      <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

      <button type="submit" class="btn btn-primary" [disabled]="loading || loginForm.invalid">
        <span *ngIf="loading" class="spinner"></span>
        {{ loading ? 'Logging in...' : 'Login' }}
      </button>
    </form>
  </div>
</div>
