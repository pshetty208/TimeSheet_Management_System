version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: tss
      POSTGRES_USER: tss_user
      POSTGRES_PASSWORD: tss_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tss
      SPRING_DATASOURCE_USERNAME: tss_user
      SPRING_DATASOURCE_PASSWORD: tss_password
      SPRING_MAIL_HOST: mailhog
      SPRING_MAIL_PORT: 1025
      JWT_SECRET: changemeinproductionpleasechangemeinproductionplease
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - mailhog

volumes:
  postgres_data:
